<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
    // Overwrites Rhino geometry colors with your 3 specific HEX codes
    AFRAME.registerComponent('material-modifier', {
        schema: { color: { type: 'color' } },
        init: function () {
            this.el.addEventListener('model-loaded', () => {
                const mesh = this.el.getObject3D('mesh');
                if (mesh) mesh.traverse(node => {
                    if (node.isMesh) node.material.color.set(this.data.color);
                });
            });
        }
    });

    AFRAME.registerComponent('reversible-dial', {
        init: function() {
            this.stabilizer = document.querySelector('#stabilizer');
            this.w2 = document.querySelector('#w2'); // Blue
            this.w3 = document.querySelector('#w3'); // Purple
        },
        tick: function () {
            if (!this.el.object3D.visible) return;

            // 1. Get calibrated rotation (IMG_20260505_115614.jpg = 0)
            let rawRad = this.el.object3D.rotation.y;
            let deg = (THREE.MathUtils.radToDeg(rawRad) + 90) % 360; 
            if (deg < 0) deg += 360;

            // 2. STABILIZER: Keeps the Pink wall in the top-left of your desk
            if (this.stabilizer) {
                this.stabilizer.object3D.rotation.y = -rawRad;
            }

            // 3. REVERSIBLE VISIBILITY
            // Clockwise rotation (increasing degrees) adds walls
            // Counter-clockwise rotation (decreasing degrees) hides them
            let showW2 = deg > 70;  // Threshold for Blue
            let showW3 = deg > 160; // Threshold for Purple

            if(this.w2) this.w2.setAttribute('visible', showW2);
            if(this.w3) this.w3.setAttribute('visible', showW3);
        }
    });
    </script>
</head>

<body style="margin:0; overflow:hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;">
        
        <a-marker type="pattern" url="pattern-switch2.patt" reversible-dial>
            
            <a-entity id="stabilizer">
                
                <!-- CORNER 1: #DB35CB (Pink) - Fixed Top-Left -->
                <a-entity id="w1" gltf-model="wall.glb" 
                          position="-2.4 0 2.4" rotation="0 0 0" scale="8 8 8" 
                          material-modifier="color: #DB35CB">
                </a-entity>

                <!-- CORNER 2: #355EDB (Blue) - Appears Top-Right -->
                <a-entity id="w2" gltf-model="wall.glb" 
                          position="2.4 0 2.4" rotation="0 90 0" scale="8 8 8" 
                          visible="false" material-modifier="color: #355EDB">
                </a-entity>

                <!-- CORNER 3: #AE35DB (Purple) - Appears Bottom-Right -->
                <a-entity id="w3" gltf-model="wall.glb" 
                          position="2.4 0 -2.4" rotation="0 180 0" scale="8 8 8" 
                          visible="false" material-modifier="color: #AE35DB">
                </a-entity>

            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
