<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Clean Anchor Test</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;">
        
        <a-marker type="pattern" url="pattern-switch2.patt">
            
            <!-- THE WALL -->
            <!-- Position 0 0 0 is the dead center of the marker -->
            <!-- Scale 10 10 10 is usually safe for Rhino mm-to-meters exports -->
            <a-entity id="wall" 
                      gltf-model="wall.glb" 
                      position="-3 0 3" 
                      rotation="0 0 0" 
                      scale="10 10 10">
            </a-entity>

            <!-- REFERENCE BOX (Optional) -->
            <!-- Helps confirm if the marker is working even if the GLB fails -->
            <a-box scale="0.05 0.05 0.05" color="red" opacity="0.5"></a-box>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
