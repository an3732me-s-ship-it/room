<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
    AFRAME.registerComponent('material-modifier', {
        schema: { color: { type: 'color' } },
        init: function () {
            this.el.addEventListener('model-loaded', () => {
                const mesh = this.el.getObject3D('mesh');
                if (mesh) mesh.traverse(node => {
                    if (node.isMesh) node.material.color.set(this.data.color);
                });
            });
        }
    });

    AFRAME.registerComponent('square-dial', {
        init: function() {
            this.unlockedCount = 0; // Starts with only Corner 1 (Index 0)
            this.stabilizer = document.querySelector('#stabilizer');
            this.corners = [
                document.querySelector('#w1'), 
                document.querySelector('#w2'), 
                document.querySelector('#w3'),
                document.querySelector('#w4')
            ];
        },
        tick: function () {
            if (!this.el.object3D.visible) return;

            // 1. Counter-rotation to keep slots fixed on desk
            let rotRad = this.el.object3D.rotation.y;
            if (this.stabilizer) {
                this.stabilizer.object3D.rotation.y = -rotRad;
            }

            // 2. Calculate degrees (0-360)
            let deg = THREE.MathUtils.radToDeg(rotRad) % 360;
            if (deg < 0) deg += 360;

            // 3. Selective Reveal Logic (Order: 1 -> 2 -> 3 -> 4)
            // Turning clockwise hits these degree milestones
            if (deg > 70 && deg < 110 && this.unlockedCount < 1) this.unlockedCount = 1;
            if (deg > 160 && deg < 200 && this.unlockedCount < 2) this.unlockedCount = 2;
            if (deg > 250 && deg < 290 && this.unlockedCount < 3) this.unlockedCount = 3;

            // 4. Update Visibility selectively
            this.corners.forEach((corner, index) => {
                if (corner) {
                    // Corner 1 (index 0) is always visible
                    // Others only show if their milestone is reached
                    corner.setAttribute('visible', index <= this.unlockedCount);
                }
            });
        }
    });
    </script>
</head>

<body style="margin:0; overflow:hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;">
        
        <a-marker type="pattern" url="pattern-switch2.patt" square-dial>
            
            <!-- STABILIZER: Stays 'frozen' relative to your laptop -->
            <a-entity id="stabilizer">
                
                <!-- Corner 1: Fixed RED -->
                <a-entity id="w1" gltf-model="wall.glb" 
                          position="-2.4 0 2.4" rotation="0 0 0" scale="8 8 8" 
                          material-modifier="color: #ff0000">
                </a-entity>

                <!-- Corner 2: Top-Right GREEN (Appears at 90°) -->
                <a-entity id="w2" gltf-model="wall.glb" 
                          position="2.4 0 2.4" rotation="0 90 0" scale="8 8 8" 
                          visible="false" material-modifier="color: #00ff00">
                </a-entity>

                <!-- Corner 3: Bottom-Right GREEN (Appears at 180°) -->
                <a-entity id="w3" gltf-model="wall.glb" 
                          position="2.4 0 -2.4" rotation="0 180 0" scale="8 8 8" 
                          visible="false" material-modifier="color: #00ff00">
                </a-entity>

                <!-- Corner 4: Bottom-Left GREEN (Appears at 270°) -->
                <a-entity id="w4" gltf-model="wall.glb" 
                          position="-2.4 0 -2.4" rotation="0 270 0" scale="8 8 8" 
                          visible="false" material-modifier="color: #00ff00">
                </a-entity>

            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
