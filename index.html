<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
    AFRAME.registerComponent('material-modifier', {
        schema: { color: { type: 'color' } },
        init: function () {
            this.el.addEventListener('model-loaded', () => {
                const mesh = this.el.getObject3D('mesh');
                if (mesh) mesh.traverse(node => {
                    if (node.isMesh) node.material.color.set(this.data.color);
                });
            });
        }
    });

    AFRAME.registerComponent('selective-reveal', {
        init: function() {
            this.unlockedCount = 0; 
            this.stabilizer = document.querySelector('#stabilizer');
            this.w2 = document.querySelector('#w2');
            this.w3 = document.querySelector('#w3');
        },
        tick: function () {
            if (!this.el.object3D.visible) return;

            // 1. Get current rotation and APPLY OFFSET
            // Based on your photo, your '0' is actually around 90 degrees in standard math.
            let rawRad = this.el.object3D.rotation.y;
            let deg = (THREE.MathUtils.radToDeg(rawRad) + 90) % 360; 
            if (deg < 0) deg += 360;

            // 2. STABILIZER: Keep the corners fixed on the desk
            if (this.stabilizer) {
                // We use the rawRad for counter-rotation to keep the desk stable
                this.stabilizer.object3D.rotation.y = -rawRad;
            }

            // 3. TRIGGER LOGIC (Order: 1 -> 2 -> 3)
            // As you rotate CLOCKWISE from your photo position:
            if (deg > 70 && deg < 130) this.unlockedCount = Math.max(this.unlockedCount, 1);
            if (deg > 160 && deg < 220) this.unlockedCount = Math.max(this.unlockedCount, 2);

            // 4. Set Visibility
            if(this.w2) this.w2.setAttribute('visible', this.unlockedCount >= 1);
            if(this.w3) this.w3.setAttribute('visible', this.unlockedCount >= 2);
        }
    });
    </script>
</head>

<body style="margin:0; overflow:hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;">
        
        <a-marker type="pattern" url="pattern-switch2.patt" selective-reveal>
            
            <a-entity id="stabilizer">
                
                <!-- CORNER 1: Fixed RED (Top-Left) -->
                <a-entity id="w1" gltf-model="wall.glb" 
                          position="-2.4 0 2.4" rotation="0 0 0" scale="8 8 8" 
                          material-modifier="color: #db35cb">
                </a-entity>

                <!-- CORNER 2: Top-Right (Green) -->
                <a-entity id="w2" gltf-model="wall.glb" 
                          position="2.4 0 2.4" rotation="0 90 0" scale="8 8 8" 
                          visible="false" material-modifier="color: #355edb">
                </a-entity>

                <!-- CORNER 3: Bottom-Right (Green) -->
                <a-entity id="w3" gltf-model="wall.glb" 
                          position="2.4 0 -2.4" rotation="0 180 0" scale="8 8 8" 
                          visible="false" material-modifier="color: #ae35db">
                </a-entity>

            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
