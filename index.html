<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mirror Test - 2 Walls</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
    AFRAME.registerComponent('rotational-mirror', {
        init: function() {
            // Select the walls once at the start
            this.w1 = document.querySelector('#w1');
            this.w2 = document.querySelector('#w2');
        },
        tick: function () {
            if (!this.el.object3D.visible) return;

            // Get marker rotation
            let degrees = THREE.MathUtils.radToDeg(this.el.object3D.rotation.y) % 360;
            if (degrees < 0) degrees += 360;

            // Wall 2 visibility logic
            if (this.w2) {
                const shouldShow = degrees > 90 && degrees < 270;
                this.w2.setAttribute('visible', shouldShow);
            }
        }
    });
    </script>
</head>

<body style="margin:0; overflow:hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;">
        
        <a-marker type="pattern" url="pattern-switch2.patt" rotational-mirror>
            
            <!-- WALL 1: Fixed Position (Left and Up) -->
            <a-entity id="w1" 
                      gltf-model="wall.glb" 
                      position="-2.4 0 2.4" 
                      rotation="0 0 0" 
                      scale="8 8 8">
            </a-entity>

            <!-- WALL 2: Mirror Position (Right and Up) -->
            <a-entity id="w2" 
                      gltf-model="wall.glb" 
                      position="2.4 0 2.4" 
                      rotation="0 90 0" 
                      scale="8 8 8"
                      visible="false">
            </a-entity>

            <!-- Debug Center Point -->
            <a-box scale="0.1 0.1 0.1" color="red"></a-box>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
