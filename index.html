<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Offset Test - Single Wall</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
    AFRAME.registerComponent('rotational-trigger', {
        tick: function () {
            if (!this.el.object3D.visible) return;

            const wall = document.querySelector('#w1');
            
            // Get marker rotation
            let degrees = THREE.MathUtils.radToDeg(this.el.object3D.rotation.y) % 360;
            if (degrees < 0) degrees += 360;

            // Only show the wall when the marker is rotated between 0 and 90 degrees
            // This lets you "find" the right orientation by spinning the marker
            if (degrees > 0 && degrees < 90) {
                wall.setAttribute('visible', true);
            } else {
                wall.setAttribute('visible', false);
            }
        }
    });
    </script>
</head>

<body style="margin:0; overflow:hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;">
        
        <a-marker type="pattern" url="pattern-switch2.patt" rotational-trigger>
            
            <!-- CENTRAL GUIDE: Helps you see where the marker center is -->
            <a-box position="0 0 0" scale="0.05 0.05 0.05" color="red"></a-box>
            
            <!-- THE SINGLE OFFSET WALL -->
            <!-- Position 0.5 0 0.5 moves it away from the red box -->
            <a-entity id="w1" 
                      gltf-model="wall.glb" 
                      position="-2 0 0.5" 
                      rotation="0 0 0" 
                      scale="10 10 10" 
                      visible="false">
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
