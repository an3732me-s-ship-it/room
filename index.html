<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
    AFRAME.registerComponent('material-modifier', {
        schema: { color: { type: 'color' } },
        init: function () {
            this.el.addEventListener('model-loaded', () => {
                const mesh = this.el.getObject3D('mesh');
                if (mesh) mesh.traverse(node => {
                    if (node.isMesh) node.material.color.set(this.data.color);
                });
            });
        }
    });

    AFRAME.registerComponent('strict-three-corners', {
        init: function() {
            this.unlockedCount = 0; 
            this.stabilizer = document.querySelector('#stabilizer');
            this.corners = [
                document.querySelector('#w1'), 
                document.querySelector('#w2'), 
                document.querySelector('#w3')
            ];
            // Safety: Force all but the first one to be hidden at start
            this.corners[1].setAttribute('visible', false);
            this.corners[2].setAttribute('visible', false);
        },
        tick: function () {
            if (!this.el.object3D.visible) return;

            let rotRad = this.el.object3D.rotation.y;
            if (this.stabilizer) {
                this.stabilizer.object3D.rotation.y = -rotRad;
            }

            let deg = THREE.MathUtils.radToDeg(rotRad) % 360;
            if (deg < 0) deg += 360;

            // NEW: LOGIC LOCKS. 
            // You MUST pass through the rotation windows in order.
            
            // To unlock Corner 2: Must be around 90 degrees
            if (this.unlockedCount === 0 && deg > 80 && deg < 110) {
                this.unlockedCount = 1;
            }
            
            // To unlock Corner 3: Must already have Corner 2 AND be around 180 degrees
            if (this.unlockedCount === 1 && deg > 170 && deg < 200) {
                this.unlockedCount = 2;
            }

            // Apply visibility based on the count
            this.corners[1].setAttribute('visible', this.unlockedCount >= 1);
            this.corners[2].setAttribute('visible', this.unlockedCount >= 2);
        }
    });
    </script>
</head>

<body style="margin:0; overflow:hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;">
        
        <a-marker type="pattern" url="pattern-switch2.patt" strict-three-corners>
            
            <a-entity id="stabilizer">
                
                <!-- Corner 1: Fixed RED (Always visible) -->
                <a-entity id="w1" gltf-model="wall.glb" 
                          position="-2.4 0 2.4" rotation="0 0 0" scale="8 8 8" 
                          material-modifier="color: #ff0000">
                </a-entity>

                <!-- Corner 2: Unlocks at 90 deg -->
                <a-entity id="w2" gltf-model="wall.glb" 
                          position="2.4 0 2.4" rotation="0 90 0" scale="8 8 8" 
                          visible="false" material-modifier="color: #00ff00">
                </a-entity>

                <!-- Corner 3: Unlocks at 180 deg -->
                <a-entity id="w3" gltf-model="wall.glb" 
                          position="2.4 0 -2.4" rotation="0 180 0" scale="8 8 8" 
                          visible="false" material-modifier="color: #00ff00">
                </a-entity>

            </a-entity>

            <a-box scale="0.1 0.1 0.1" color="black"></a-box>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
