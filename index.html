<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Rotational Mirror Test</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
    AFRAME.registerComponent('rotational-mirror', {
        init: function() {
            // We use querySelectorAll to find all 4 walls inside this marker
            this.walls = this.el.querySelectorAll('.wall-piece');
        },
        tick: function () {
            if (!this.el.object3D.visible) return;

            // Get rotation in degrees
            let degrees = THREE.MathUtils.radToDeg(this.el.object3D.rotation.y) % 360;
            if (degrees < 0) degrees += 360;

            // Update visibility based on rotation
            // Wall 1: Always on
            // Wall 2: > 90
            // Wall 3: > 180
            // Wall 4: > 270
            if(this.walls.length === 4) {
                this.walls[0].setAttribute('visible', true); 
                this.walls[1].setAttribute('visible', degrees > 90);
                this.walls[2].setAttribute('visible', degrees > 180);
                this.walls[3].setAttribute('visible', degrees > 270);
            }
        }
    });
    </script>
</head>

<body style="margin:0; overflow:hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;">
        
        <a-marker type="pattern" url="pattern-switch2.patt" rotational-mirror>
            
            <!-- DEBUG BOX: If you see this red box but NO walls, 
                 the problem is the .glb file path or scale. -->
            <a-box position="0 0 0" scale="0.05 0.05 0.05" color="red"></a-box>
            
            <!-- THE WALLS -->
            <!-- Note: I added scale="10 10 10" because Rhino models are often tiny -->
            <a-entity id="w1" class="wall-piece" gltf-model="wall.glb" rotation="0 0 0" scale="10 10 10"></a-entity>
            <a-entity id="w2" class="wall-piece" gltf-model="wall.glb" rotation="0 90 0" scale="10 10 10" visible="false"></a-entity>
            <a-entity id="w3" class="wall-piece" gltf-model="wall.glb" rotation="0 180 0" scale="10 10 10" visible="false"></a-entity>
            <a-entity id="w4" class="wall-piece" gltf-model="wall.glb" rotation="0 270 0" scale="10 10 10" visible="false"></a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
