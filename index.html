<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Rotational Mirror Test</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
    AFRAME.registerComponent('rotational-mirror', {
        init: function() {
            // Reference the 4 wall entities
            this.walls = [
                document.querySelector('#w1'),
                document.querySelector('#w2'),
                document.querySelector('#w3'),
                document.querySelector('#w4')
            ];
        },
        tick: function () {
            if (!this.el.object3D.visible) return;

            // Convert radians to degrees
            let degrees = THREE.MathUtils.radToDeg(this.el.object3D.rotation.y) % 360;
            if (degrees < 0) degrees += 360;

            // Multiplication Logic:
            // 0-90: 1 wall | 90-180: 2 walls | 180-270: 3 walls | 270-360: 4 walls
            this.walls[0].setAttribute('visible', true); 
            this.walls[1].setAttribute('visible', degrees > 90);
            this.walls[2].setAttribute('visible', degrees > 180);
            this.walls[3].setAttribute('visible', degrees > 270);
        }
    });
    </script>
</head>

<body style="margin:0; overflow:hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- Using your pattern-switch2.patt -->
        <a-marker type="pattern" url="pattern-switch2.patt" rotational-mirror>
            
            <!-- All 4 walls share the same center point. 
                 Rhino origin (0,0,0) should be the "inside corner" of the wall. -->
            
            <a-entity id="w1" gltf-model="url(wall.glb)" rotation="0 0 0" scale="10 10 10" visible="false"></a-entity>
            <a-entity id="w2" gltf-model="url(wall.glb)" rotation="0 90 0" scale="10 10 10" visible="false"></a-entity>
            <a-entity id="w3" gltf-model="url(wall.glb)" rotation="0 180 0" scale="10 10 10" visible="false"></a-entity>
            <a-entity id="w4" gltf-model="url(wall.glb)" rotation="0 270 0" scale="10 10 10" visible="false"></a-entity>

            <!-- Optional: A small floor guide to see the center -->
            <a-plane rotation="-90 0 0" width="0.2" height="0.2" color="grey" opacity="0.5"></a-plane>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
