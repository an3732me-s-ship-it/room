<script>
    AFRAME.registerComponent('rotational-mirror', {
        tick: function () {
            if (!this.el.object3D.visible) return;

            const w2 = document.querySelector('#w2');
            
            // Get marker rotation (0-360)
            let degrees = THREE.MathUtils.radToDeg(this.el.object3D.rotation.y) % 360;
            if (degrees < 0) degrees += 360;

            // Trigger second wall if rotated more than 90 degrees
            if (degrees > 90) {
                w2.setAttribute('visible', true);
            } else {
                w2.setAttribute('visible', false);
            }
        }
    });
</script>

<!-- ... inside your scene ... -->

<a-marker type="pattern" url="pattern-switch2.patt" rotational-mirror>
    
    <!-- WALL 1: Left and Up (Always Visible) -->
    <a-entity id="w1" 
              gltf-model="wall.glb" 
              position="-2.4 0 2.4" 
              rotation="0 0 0" 
              scale="8 8 8">
    </a-entity>

    <!-- WALL 2: Right and Up (Triggers at 90° rotation) -->
    <!-- X is now positive 2.4 | Rotation is 90 -->
    <a-entity id="w2" 
              gltf-model="wall.glb" 
              position="2.4 0 2.4" 
              rotation="0 90 0" 
              scale="8 8 8"
              visible="false">
    </a-entity>

    <a-box scale="0.1 0.1 0.1" color="red"></a-box>
</a-marker>
