<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
    AFRAME.registerComponent('material-modifier', {
        schema: { color: { type: 'color' } },
        init: function () {
            this.el.addEventListener('model-loaded', () => {
                const mesh = this.el.getObject3D('mesh');
                if (mesh) mesh.traverse(node => {
                    if (node.isMesh) node.material.color.set(this.data.color);
                });
            });
        }
    });

    AFRAME.registerComponent('square-dial', {
        init: function() {
            this.unlocked = 0;
            this.stabilizer = document.querySelector('#stabilizer');
            this.w2 = document.querySelector('#w2');
            this.w3 = document.querySelector('#w3');
            this.w4 = document.querySelector('#w4');
        },
        tick: function () {
            if (!this.el.object3D.visible) return;

            // 1. Get Marker Rotation
            let rotRad = this.el.object3D.rotation.y;
            let deg = THREE.MathUtils.radToDeg(rotRad) % 360;
            if (deg < 0) deg += 360;

            // 2. COUNTER-ROTATE THE STABILIZER
            // This makes the internal 'grid' stay fixed to your laptop/desk
            if (this.stabilizer) {
                this.stabilizer.object3D.rotation.y = -rotRad;
            }

            // 3. STRICT LOCKING LOGIC
            // We only unlock if the marker is turned to the specific quadrant
            if (deg > 80 && deg < 100) this.unlocked = Math.max(this.unlocked, 1);
            if (deg > 170 && deg < 190) this.unlocked = Math.max(this.unlocked, 2);
            if (deg > 260 && deg < 280) this.unlocked = Math.max(this.unlocked, 3);

            // 4. Update Visibility
            if(this.w2) this.w2.setAttribute('visible', this.unlocked >= 1);
            if(this.w3) this.w3.setAttribute('visible', this.unlocked >= 2);
            if(this.w4) this.w4.setAttribute('visible', this.unlocked >= 3);
        }
    });
    </script>
</head>

<body style="margin:0; overflow:hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;">
        
        <a-marker type="pattern" url="pattern-switch2.patt" square-dial>
            
            <!-- STABILIZER: This entity rotates opposite to the marker -->
            <!-- It keeps the X and Z axes from spinning on your desk -->
            <a-entity id="stabilizer">
                
                <!-- CORNER 1: Fixed (Red) -->
                <a-entity id="w1" gltf-model="wall.glb" 
                          position="-2.4 0 2.4" rotation="0 0 0" scale="8 8 8" 
                          material-modifier="color: #ff0000">
                </a-entity>

                <!-- CORNER 2: Top-Right (90 deg) -->
                <a-entity id="w2" gltf-model="wall.glb" 
                          position="2.4 0 2.4" rotation="0 90 0" scale="8 8 8" 
                          visible="false" material-modifier="color: #00ff00">
                </a-entity>

                <!-- CORNER 3: Bottom-Right (180 deg) -->
                <a-entity id="w3" gltf-model="wall.glb" 
                          position="2.4 0 -2.4" rotation="0 180 0" scale="8 8 8" 
                          visible="false" material-modifier="color: #00ff00">
                </a-entity>

                <!-- CORNER 4: Bottom-Left (270 deg) -->
                <a-entity id="w4" gltf-model="wall.glb" 
                          position="-2.4 0 -2.4" rotation="0 270 0" scale="8 8 8" 
                          visible="false" material-modifier="color: #00ff00">
                </a-entity>

            </a-entity>

            <a-box scale="0.1 0.1 0.1" color="black"></a-box>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
